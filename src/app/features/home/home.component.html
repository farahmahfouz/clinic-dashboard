<div class="home-wrapper">
  <div class="header">
    <div>
      <h2 class="title">Dashboard</h2>
      <p class="subtitle">Quick overview of clinic bookings</p>
    </div>
  </div>

  <div *ngIf="isLoading" class="state-box">
    <span>Loading data...</span>
  </div>

  <div *ngIf="error && !isLoading" class="state-box state-error">
    <span>{{ error }}</span>
  </div>

  <div *ngIf="!isLoading && !error" class="content-grid">
    <!-- Summary cards -->
    <div class="summary-grid">
      <div class="summary-card">
        <p class="summary-label">Total Bookings</p>
        <p class="summary-value">{{ totalBookings }}</p>
      </div>

      <div class="summary-card success">
        <p class="summary-label">Completed</p>
        <p class="summary-value">{{ completedBookings }}</p>
      </div>

      <div class="summary-card danger">
        <p class="summary-label">Cancelled</p>
        <p class="summary-value">{{ cancelledBookings }}</p>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
      <div class="card">
        <div class="card-header">
          <h3>Bookings per Month (Current Year)</h3>
        </div>
        <div class="card-body">
          <canvas
            baseChart
            [type]="'bar'"
            [data]="monthlyChartData"
            [options]="monthlyChartOptions"
          >
          </canvas>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>Bookings Distribution by Status</h3>
        </div>
        <div class="card-body">
          <canvas
            baseChart
            [type]="'doughnut'"
            [data]="statusChartData"
            [options]="statusChartOptions"
          >
          </canvas>
        </div>
      </div>
    </div>
  </div>
</div>
