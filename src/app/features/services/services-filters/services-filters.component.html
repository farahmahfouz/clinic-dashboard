<div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 pb-10">

  <div class="w-full mr-auto md:w-64">
    <input
      type="text"
      placeholder="Search by name..."
      [(ngModel)]="searchValue"
      (ngModelChange)="onSearchChange($event)"
      class="w-full px-3 py-2 rounded-lg border border-border bg-surface text-text text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-primary" />
  </div>

  <div class="w-full md:w-64">
    <select
      [(ngModel)]="selectedSort"
      (ngModelChange)="onSortChange($event)"
      class="select w-full px-3 py-2 rounded-lg border border-border bg-surface text-text text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-primary">

      <option value="-ratingsAverage" class="p-2">
        Sort by rating (high first)
      </option>

      <option value="ratingsAverage" class="p-2">
        Sort by rating (low first)
      </option>

      <option value="name" class="p-2">
        Sort by name
      </option>

    </select>
  </div>
</div>
