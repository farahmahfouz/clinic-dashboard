<app-services-filters
  [searchValue]="searchValue"
  [selectedSort]="selectedSort"
  (searchChange)="searchServices($event)"
  (sortChange)="sortRatings($event)">
</app-services-filters>

@if (services$ | async; as services) {
<app-table [columns]="columns" [data]="services" [rowTemplate]="serviceRow"/>
}

<ng-template #serviceRow let-service let-i="index">
  <tr>
    <th>{{ i + 1 }}</th>
    <td>
      <img [src]="service.coverImage" class="w-12 h-10 object-cover inline-block">
    </td>
    <td>{{ service.name }}</td>
    <td>{{ service.ratingsAverage }}</td>
    <td>{{ service.createdAt | date }}</td>
    <td class="relative">
      <button (click)="toggleMenu(i)">
        <app-icon-operation />
      </button>

      @if (openIndex === i) {
      <div appClickOutSide (clickOutside)="openIndex = null"
        class="absolute right-0 mt-2 w-32 bg-white border rounded-lg shadow-lg z-50">
        <button class="block w-full text-left px-4 py-2 hover:bg-gray-100" (click)="openEdit(service)">
          Edit
        </button>

        <button class="block w-full text-left px-4 py-2 hover:bg-gray-100 text-danger" (click)="openDelete(service)">
          Delete
        </button>
      </div>
      }
    </td>
  </tr>
</ng-template>

<div class="pt-6 flex justify-end">
  <button appButton (click)="openAdd()">
    Add
  </button>
</div>

<app-modal [isOpen]="isModalOpen" [title]="isEditMode ? 'Edit Service' : 'Add Service'" (close)="closeModal()" >
  <app-service-form [initialData]="selectedService" (submitForm)="handleSubmit($event)"/>
</app-modal>

<app-modal 
  [isOpen]="isDeleteOpen"
  title="Delete Service"
  (close)="isDeleteOpen = false">

  <div class="p-4">
    <p class="mb-4">
      Are you sure you want to delete 
      <strong>{{ serviceToDelete?.name }}</strong> ?
    </p>

    <div class="flex justify-end gap-2">
      <button appButton variant="secondary" (click)="isDeleteOpen = false">
        Cancel
      </button>

      <button appButton variant="danger" (click)="confirmDelete()">
        Delete
      </button>
    </div>
  </div>

</app-modal>
