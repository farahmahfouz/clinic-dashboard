<div class="flex flex-col md:flex-row md:items-center md:justify-end gap-4 pb-10">

  <!-- Filter Tabs -->
  <div class="bg-surface border border-border p-1 rounded-xl flex gap-1 w-fit shadow-sm">

    <button class="px-4 py-2 rounded-lg text-sm font-medium bg-primary text-white">
      All
    </button>

    <button class="px-4 py-2 rounded-lg text-sm font-medium text-text hover:bg-hoverGray transition">

    </button>

    <button class="px-4 py-2 rounded-lg text-sm font-medium text-text hover:bg-hoverGray transition">
